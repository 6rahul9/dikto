kind = "web"
previewPath = "/"
title = "Dikto - Luxury Real Estate"
version = "1.0.0"
id = "artifacts/dikto"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25117

[services.development]
run = "pnpm --filter @workspace/dikto run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dikto", "run", "build" ]
publicDir = "artifacts/dikto/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25117"
BASE_PATH = "/"
